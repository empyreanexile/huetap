org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Kotlin incremental compilation on Windows when the project lives on a
# different drive than the Pub cache (e.g. project on D:\, Pub cache on C:\).
# Kotlin's RelocatableFileToPathConverter throws "this and base files have
# different roots" when trying to compute relative paths across drive letters,
# which corrupts the incremental caches and fails the build. Full (non-
# incremental) Kotlin compilation sidesteps the converter entirely.
kotlin.incremental=false
