# Build split-ABI APKs on every semver tag push and attach them to a
# GitHub Release. Debug-signed for the placeholder phase; swap to
# --release and add the keystore steps once signing credentials land
# (see the plan's §2.3 and §3.2 for the upgrade path).
name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # required by action-gh-release to create the Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

      # Split-per-abi produces app-arm64-v8a-debug.apk, app-armeabi-v7a-debug.apk,
      # app-x86_64-debug.apk. Debug-signed is fine for sideloading in this phase.
      - run: flutter build apk --debug --split-per-abi

      - name: Checksum APKs
        working-directory: build/app/outputs/flutter-apk
        run: sha256sum *.apk > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/flutter-apk/SHA256SUMS
          generate_release_notes: true
          body: |
            ## Install

            Sideload the APK matching your phone's ABI (enable "Install from unknown sources" in Android settings):

            - `app-arm64-v8a-debug.apk` — most modern phones (Android 14+, 64-bit)
            - `app-armeabi-v7a-debug.apk` — older 32-bit phones
            - `app-x86_64-debug.apk` — emulators

            Verify the download against `SHA256SUMS`.

            > These are debug-signed builds for the pre-v1.0 placeholder phase. Release-signed builds will ship once the signing keystore is set up.
