# Lint, test, and format guard. Runs on every PR and on pushes to main.
# Mirrors SPEC §7.3. No APK build here — that happens in release.yml on tag push.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version
      - run: flutter pub get
      # Drift schema codegen. Must run before analyze/test — `.g.dart` files are gitignored.
      - run: dart run build_runner build --delete-conflicting-outputs
      # Exclude generated files from the format check (build_runner output is not `dart format`-clean).
      - run: dart format --output=none --set-exit-if-changed $(find lib test -name '*.dart' -not -name '*.g.dart' -not -name '*.freezed.dart')
      - run: flutter analyze
      - run: flutter test
